# Default training config (bundled with the package; copy or pass path to `toy-deepfake train`).

dataset_train:
  point_dim: 2
  num_clusters: 3
  num_samples: 100000
  spiral_scale: 0.5
  radius_noise_std: 0.1

dataset_val:
  point_dim: 2
  num_clusters: 3
  num_samples: 1000
  spiral_scale: 0.5
  radius_noise_std: 0.1

model:
  input_dim: ${dataset_train.point_dim}
  latent_dim: 2
  hidden_dim: 32
  num_identities: ${dataset_train.num_clusters}

training:
  batch_size: 256
  num_workers: 0
  max_epochs: 2000
  learning_rate: 0.001
  log_dir: lightning_logs
  logger_name: toy_ae
  use_tensorboard: true
  use_csv: true
  accelerator: auto
  devices: 1
  seed: 42
