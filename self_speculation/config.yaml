model:
  hidden_size: 256
  num_layers: 3

dataset:
  num_bits: 12
  num_tokens: 2
  mixture:
    means: [800, 3000]
    variances: [40000, 90000]
    probabilities: [0.5, 0.5]

training:
  learning_rate: 1e-3
  batch_size: 256
  max_epochs: 50
  steps_per_epoch: 200

validation:
  num_samples: 1000
  max_refinement_steps: 50
  histogram_dir: histograms
