latent_dim: 16

dataset:
  width: 128
  height: 128
  identity_folders:
    - "/Users/thomasr/Documents/deepfakes/test_data/128x128/tom_1min_no_glasses"
    - "/Users/thomasr/Documents/deepfakes/test_data/128x128/tom_1min_black_glasses"
    - "/Users/thomasr/Documents/deepfakes/test_data/128x128/tom_1min_blue_glasses"

encoder:
  latent_dim: ${latent_dim}
  in_channels: 3
  blocks: [1, 2, 2, 3, 3]
  channels: [32, 64, 128, 128, 128]

decoder:
  latent_dim: ${latent_dim}
  out_channels: 3
  blocks: [ 3, 3, 2, 2, 1]
  channels: [ 128, 128, 128, 64, 32]
  identity_dim: 128

discriminator:
  in_channels: ${latent_dim}
  hidden_channels: 128
  num_classes: 3


training:
  batch_size: 32
  learning_rate: 0.0001
  max_epochs: 1000
  seed: 42
  steps_per_epoch: 500
  workers: 0
